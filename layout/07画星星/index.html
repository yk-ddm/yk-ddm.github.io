<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>画星星</title>
		<style type="text/css">
			html ,
			body {
				height: 100%;
			}
			body {
				margin: 0;
			}
		</style>
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<script type="text/javascript">
			var canvas = document.querySelector('#canvas');
			canvas.width = document.documentElement.clientWidth;
			canvas.height = document.documentElement.clientHeight;
		
			var ctx = canvas.getContext('2d');
			ctx.beginPath();
			ctx.fillStyle = "#999";
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			ctx.moveTo(100, 100);
			ctx.lineTo(300, 100);
			ctx.lineTo(100, 200);
			ctx.lineTo(200, 50);
			ctx.lineTo(300, 200);
			//ctx.lineTo(100, 100);
			
			ctx.closePath();
			ctx.strokeStyle = "#000";
			ctx.stroke();
		</script>
	</body>
</html>
