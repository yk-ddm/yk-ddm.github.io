<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>表格练一练</title>
		<style>
			.box {
				width: 250px;
			}
		</style>
	</head>
	<body style="background-color: #ccc;">
		<!--方式一，tr,td-->
		<table>
			<tr>
				<td>头像</td>
				<td>
					<img style="border-radius: 50%;vertical-align: middle;" src="images/xiong.jpg" width=100 height=100 alt="xiong">
					<input type="button" value="修改头像" style='width: 100px;height: 34px;margin-left: 20px;background-color: #52A3F5;border: none;border-radius: 5px;color: #fff;'>
				</td>
			</tr>
			<tr>
				<td>邮箱</td>
				<td><input type="text" class="box"></td>
			</tr>
			<tr>
				<td>手机</td>
				<td><input type="text" class="box"></td>
			</tr>
			<tr>
				<td>地址</td>
				<td><input type="text" class="box"></td>
			</tr>
			<tr>
				<td>姓名</td>
				<td><input type="text" class="box"></td>
			</tr>
			<tr>
				<td>QQ</td>
				<td><input type="text" class="box"></td>
			</tr>
			<tr>
				<td></td>
				<td><input type="button" value="保存" style='width: 100px;height: 34px;background-color: #52A3F5;border: none;border-radius: 5px;color: #fff;'></td>
			</tr>
		</table>
	</body>
</html>
