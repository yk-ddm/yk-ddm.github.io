<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>opacity的练习</title>
<style>
	.first-text,.second-text,.thired-text,.fourth-text,.fifth-text,.sixth-text,.seventh-text,.eighth-text,.ninth-text,.tenth-text {
		width: 391px;
		height: 54px;
		background: url('images/bg.png') no-repeat;
	}
	.first-text,.second-text,.thired-text,.fourth-text,.fifth-text {
		color: red;
	}
	.sixth-text,.seventh-text,.eighth-text,.ninth-text,.tenth-text {
		color: yellow;
	}
	.first-text {
		opacity: 0.1;
	}
	.second-text {
		opacity: 0.2;
	}
	.thired-text {
		opacity: 0.3;
	}
	.fourth-text {
		opacity: 0.4;
	}
	.fifth-text {
		opacity: 0.5;
	}
	.sixth-text {
		opacity: 0.6;
	}
	.seventh-text {
		opacity: 0.7;
	}
	.eighth-text {
		opacity: 0.8;
	}
	.ninth-text {
		opacity: 0.9;
	}
	.tenth-text {
		opacity: 1.0;
	}
</style>
</head>
<body>
<div style="border:2px dashed #FF6600;padding:10px;margin:10px;background-color:#FFF; width:800px;">
<img src="images/demo.png" width="400" />
<h4 style="color:#339;">请写出上图的效果的样式</h4>
</div>
<div class="first-text"><code>opacity:0.1</code></div>
<div class="second-text"><code>opacity:0.2</code></div>
<div class="thired-text"><code>opacity:0.3</code></div>
<div class="fourth-text"><code>opacity:0.4</code></div>
<div class="fifth-text"><code>opacity:0.5</code></div>
<div class="sixth-text"><code>opacity:0.6</code></div>
<div class="seventh-text"><code>opacity:0.7</code></div>
<div class="eighth-text"><code>opacity:0.8</code></div>
<div class="ninth-text"><code>opacity:0.9</code></div>
<div class="tenth-text"><code>opacity:1.0</code></div>
</body>
</html>
