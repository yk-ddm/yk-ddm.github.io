<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>作业06</title>
		<style>
			* {
				color: #ccc;
			}
			body,p {
				margin: 0;
			}
			body {
				background-color: #ccc;
			}
			p {
				padding-top: 15px;
				padding-bottom: 15px;
			}
			img {
				border-radius: 10px;
			}
			#top-content {
				background-color: #3C3A3B;
			}
			.first-img {
				width: 200px;
				height: 200px;
				margin-left: 25px;
			}
			#middle-content {
				background-color: #799456;
			}
			#middle-content p {
				width: 400px;
				margin-left: 50px;
			}
			#bottom-content {
				background-color: #128596;
			}
			.second-img {
				width: 400px;
				height: 400px;
			}
			span {
				font-size: 12px;
			}
			.info-text {
				margin-left: 25px;
				font-weight: bold;
				text-shadow: 3px 6px 2px red;
			}
		</style>
	</head>
	<body>
		<div id="top-content">
			<img class='first-img' src="images/1.jpg" alt="作业06">
			<span>HTML5跨平台开发相关知识</span>
		</div>
		<div id="middle-content">
			<p>2019.9.16号，今天上午讲解了css3样式语法：内部样式style='border: 1px solid #000;'（本节课）讲解标签选择器p,span,em,i,div,img,a,ul,li等等；类选择器的使用；id选择器（唯一性），line-height行高属性；border-radius圆角属性；块元素有（div，ul，li,p,h1~h6），行内元素有那些(span,a,i,em,b,strong)；</p>
		</div>
		<div id="bottom-content">
			<img class='second-img' src="images/2.png" alt="作业06">
			<img class='second-img' src="images/3.png" alt="作业06">
			<img class='second-img' src="images/4.png" alt="作业06">
			<p class="info-text">来自17级的学生制作--杨侃</p>
		</div>
	</body>
</html>
